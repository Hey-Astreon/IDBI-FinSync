version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: idbi-finsync-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: idbi_finsync
      POSTGRES_USER: idbi_user
      POSTGRES_PASSWORD: idbi_secure_password_2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idbi_user -d idbi_finsync"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: idbi-finsync-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
